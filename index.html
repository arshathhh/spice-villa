<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <title>web page</title>
</head>
<body>
    <header id="header">

        
    <div class="navbar">
        <nav>
        <ul>
            <li><a href="#" id="lii">Contact</a></li>
            <li><a href="#" id="lii">Menu</a></li>
            <li><a href="#" id="lii">Booking</a></li>
            <li><a href="#" id="lii">About</a></li>
            <li><a href="#" id="lii">Home</a></li>
        </ul>
        </nav>
        <h2> Spice villa</h2>
        </header>
    </div>
    <div>
        <div class="heading">
            <h2 >Reserve Your</h2>
            <h1 >Perfect Table</h2>
            <p>Book Your dining experience with comfort and elegance.   
                 Where every meal become an  <br> <span>unfforgettable memory.</span></p>
        
        </div>
        <section id="section2">
           <form class="booking-form">

    <div class="input-box">
      <h4>YOUR NAME</h4>

      <div class="field">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="John Doe">
      </div>
    </div>

    <div class="input-box">
      <h4>PHONE NUMBER</h4>

      <div class="field">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" placeholder="+91 98765 43210">
      </div>
    </div>

    <div class="input-box">
      <h4>DATE</h4>

      <div class="field">
        <i class="fa-solid fa-calendar"></i>
        <input type="date">
      </div>
    </div>

    <div class="input-box">
      <h4>TIME</h4>

      <div class="field">
        <i class="fa-solid fa-clock"></i>

        <select>
          <option>Select Time</option>
          <option>07:00 PM</option>
          <option>08:00 PM</option>
          <option>09:00 PM</option>
        </select>
      </div>
    </div>

    <div class="input-box">
      <h4>GUESTS</h4>

      <div class="field">
        <i class="fa-solid fa-users"></i>

        <select>
          <option>1 Guest</option>
          <option>2 Guests</option>
          <option>4 Guests</option>
          <option>6 Guests</option>
        </select>
      </div>
    </div>

    <button class="book-btn">BOOK A TABLE</button>

  </form>
        



    </div>
    
</body>
</html>
